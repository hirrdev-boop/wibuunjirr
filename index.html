<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeVerse - Nonton Anime Langsung di Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .video-player {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(233,69,96,0.3);
        }
        .video-player iframe {
            width: 100%;
            height: 500px;
            border: none;
        }
        .info {
            background: #1e1e2e;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }
        .anime-card {
            background: #2a2a3a;
            border-radius: 12px;
            padding: 0.8rem;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .anime-card:hover {
            transform: scale(1.02);
            background: #e94560;
        }
        img {
            width: 100%;
            border-radius: 8px;
        }
        @media (max-width: 700px) {
            .video-player iframe { height: 250px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 style="margin-bottom: 1rem;">🎬 AnimeVerse - Nonton Anime</h1>

    <!-- VIDEO LANGSUNG DI WEB (embed) - PASTI BISA TANPA REDIRECT -->
    <div class="video-player">
        <iframe 
            src="https://www.youtube.com/embed/E4Oq2ZV9iDs?autoplay=0&modestbranding=1&rel=0&showinfo=0" 
            title="Anime Video Player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="info">
        ✅ Video diputar LANGSUNG di halaman ini (bukan ke YouTube.com)<br>
        Klik tombol play ▶️ di tengah video, maka akan jalan di sini.
    </div>

    <h2>📺 Daftar Anime Populer (Klik untuk info)</h2>
    <div id="animeList" class="anime-grid">Memuat...</div>
</div>

<script>
    async function loadAnime() {
        const res = await fetch('https://api.jikan.moe/v4/top/anime?limit=12');
        const data = await res.json();
        const container = document.getElementById('animeList');
        container.innerHTML = '';
        data.data.forEach(anime => {
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.innerHTML = `
                <img src="${anime.images.jpg.image_url}" onerror="this.src='https://placehold.co/200x280'">
                <p style="margin-top: 8px; font-weight: bold;">${anime.title}</p>
                <small>⭐ ${anime.score || '?'}</small>
            `;
            card.onclick = () => alert(`🎬 ${anime.title}\n\nSinopsis: ${anime.synopsis?.slice(0, 150)}...\n\nRating: ${anime.score}/10\nEpisode: ${anime.episodes || '?'}`);
            container.appendChild(card);
        });
    }
    loadAnime();
</script>
</body>
</html>
